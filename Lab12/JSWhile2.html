<html> 
<head> 
<title>JSWhile2</title> 
<script language="JavaScript"> 
var i=1,n=7,c=0; 
while(i<=n) 
{ 
if(n%i==0) 
c++; 
} 
if(c==2) 
document.write("<h1>"+"Number is prime" +"</h1>"); 
else 
document.write("<h1>"+"Number is not prime" +"</h1>"); 
</script> 
</head> 
<body bgcolor="white" text="brown"> 
</body> 
</html>
