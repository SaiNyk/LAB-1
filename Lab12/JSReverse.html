<html> 
<head> 
<title>JSReverse</title> 
<script language="JavaScript"> 
let num=parseInt(prompt("Enter a number:"))
var rev=0,rem; 
do 
{ 
rem=num%10; 
rev=rev*10+rem; 
num=num/10; 
} 
while(num|=0); 
document.write("Reverse value:"+rev); 
</script> 
</head> 
<body bgcolor="white" text="brown"> 
</body> 
</html>
